<svg width="1000" height="510" viewBox="0 0 1000 510" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
      .sans { font-family: 'Segoe UI', Arial, sans-serif; }
    </style>
    <marker id="m-tbl" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#7dd3fc"/></marker>
    <marker id="m-cap" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#c7d2fe"/></marker>
    <marker id="m-cg"  viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#fbbf24"/></marker>
    <marker id="m-col" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#f59e0b"/></marker>
    <marker id="m-thd" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#38bdf8"/></marker>
    <marker id="m-th"  viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#67e8f9"/></marker>
    <marker id="m-tbd" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#4ade80"/></marker>
    <marker id="m-tr"  viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#a3e635"/></marker>
    <marker id="m-td"  viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#fb923c"/></marker>
    <marker id="m-tf"  viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#86efac"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="510" fill="#0f1117"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" class="sans" fill="#7dd3fc" font-size="21" font-weight="bold">HTML Table Tags — Visual Reference</text>
  <text x="500" y="58" text-anchor="middle" class="sans" fill="#475569" font-size="12">Every tag shown with arrows on a real table</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!--                  TABLE                         -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Outer <table> border -->
  <rect x="290" y="100" width="420" height="234" rx="4" fill="none" stroke="#7dd3fc" stroke-width="2.5"/>

  <!-- CAPTION -->
  <rect x="290" y="100" width="420" height="38" rx="4" fill="#312e81"/>
  <line x1="290" y1="138" x2="710" y2="138" stroke="#4c4a9e" stroke-width="1"/>
  <text x="500" y="124" text-anchor="middle" class="sans" fill="#c7d2fe" font-size="13">Top Scorers — Season 2025</text>

  <!-- COL dashed dividers (colgroup / col) -->
  <line x1="430" y1="138" x2="430" y2="334" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.55"/>
  <line x1="570" y1="138" x2="570" y2="334" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.55"/>

  <!-- THEAD background + highlight border -->
  <rect x="291" y="138" width="418" height="44" fill="#1e3a5f"/>
  <rect x="290" y="138" width="420" height="44" fill="none" stroke="#38bdf8" stroke-width="1.3" opacity="0.7"/>
  <line x1="430" y1="138" x2="430" y2="182" stroke="#334155" stroke-width="1"/>
  <line x1="570" y1="138" x2="570" y2="182" stroke="#334155" stroke-width="1"/>
  <text x="360" y="165" text-anchor="middle" class="sans" fill="#7dd3fc" font-size="13" font-weight="bold">Player</text>
  <text x="500" y="165" text-anchor="middle" class="sans" fill="#7dd3fc" font-size="13" font-weight="bold">Goals</text>
  <text x="640" y="165" text-anchor="middle" class="sans" fill="#7dd3fc" font-size="13" font-weight="bold">Assists</text>
  <!-- TH highlight on 2nd th cell -->
  <rect x="430" y="138" width="140" height="44" fill="rgba(103,232,249,0.10)" stroke="#67e8f9" stroke-width="1.8" stroke-dasharray="3,2"/>

  <!-- TBODY rows -->
  <!-- tr1: y=182-220 (highlighted) -->
  <rect x="291" y="182" width="418" height="38" fill="#1a2235"/>
  <rect x="290" y="182" width="420" height="38" fill="none" stroke="#a3e635" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.8"/>
  <line x1="430" y1="182" x2="430" y2="220" stroke="#2d3a4f" stroke-width="1"/>
  <line x1="570" y1="182" x2="570" y2="220" stroke="#2d3a4f" stroke-width="1"/>
  <text x="360" y="206" text-anchor="middle" class="sans" fill="#cbd5e1" font-size="12">Smit D.</text>
  <text x="500" y="206" text-anchor="middle" class="sans" fill="#cbd5e1" font-size="12">22</text>
  <text x="640" y="206" text-anchor="middle" class="sans" fill="#cbd5e1" font-size="12">11</text>

  <!-- tr2: y=220-258 -->
  <rect x="291" y="220" width="418" height="38" fill="#1e2a3a"/>
  <line x1="430" y1="220" x2="430" y2="258" stroke="#2d3a4f" stroke-width="1"/>
  <line x1="570" y1="220" x2="570" y2="258" stroke="#2d3a4f" stroke-width="1"/>
  <text x="360" y="244" text-anchor="middle" class="sans" fill="#cbd5e1" font-size="12">Alex K.</text>
  <text x="500" y="244" text-anchor="middle" class="sans" fill="#cbd5e1" font-size="12">18</text>
  <text x="640" y="244" text-anchor="middle" class="sans" fill="#cbd5e1" font-size="12">9</text>
  <!-- TD highlight on tr2 col1 -->
  <rect x="290" y="220" width="140" height="38" fill="rgba(251,146,60,0.13)" stroke="#fb923c" stroke-width="1.8" stroke-dasharray="3,2"/>

  <!-- tr3: y=258-296 -->
  <rect x="291" y="258" width="418" height="38" fill="#1a2235"/>
  <line x1="430" y1="258" x2="430" y2="296" stroke="#2d3a4f" stroke-width="1"/>
  <line x1="570" y1="258" x2="570" y2="296" stroke="#2d3a4f" stroke-width="1"/>
  <text x="360" y="282" text-anchor="middle" class="sans" fill="#cbd5e1" font-size="12">Priya M.</text>
  <text x="500" y="282" text-anchor="middle" class="sans" fill="#cbd5e1" font-size="12">15</text>
  <text x="640" y="282" text-anchor="middle" class="sans" fill="#cbd5e1" font-size="12">14</text>

  <!-- tbody row separators + dashed outline -->
  <line x1="290" y1="220" x2="710" y2="220" stroke="#2d3a4f" stroke-width="1"/>
  <line x1="290" y1="258" x2="710" y2="258" stroke="#2d3a4f" stroke-width="1"/>
  <line x1="290" y1="296" x2="710" y2="296" stroke="#334155" stroke-width="1.5"/>
  <rect x="290" y="182" width="420" height="114" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- TFOOT: y=296-334 -->
  <rect x="291" y="296" width="418" height="38" fill="#1a2d1a"/>
  <rect x="290" y="296" width="420" height="38" fill="none" stroke="#86efac" stroke-width="1.3" opacity="0.7"/>
  <text x="500" y="320" text-anchor="middle" class="sans" fill="#86efac" font-size="12" font-style="italic">* Regular season only</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!--                LEFT LABELS                     -->
  <!-- ═══════════════════════════════════════════════ -->
  <!-- box: x=88, w=172, h=40  |  right edge x=260  |  table left x=290 -->

  <!-- 1. <caption> -->
  <rect x="88" y="104" width="172" height="40" rx="8" fill="#1a1625" stroke="#818cf8" stroke-width="1.5"/>
  <text x="98" y="120" class="mono" fill="#c7d2fe" font-size="13" font-weight="bold">&lt;caption&gt;</text>
  <text x="98" y="136" class="sans" fill="#475569" font-size="10">Title / caption text</text>
  <path d="M260,124 C273,124 283,124 290,124" stroke="#818cf8" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#m-cap)"/>

  <!-- 2. <thead> -->
  <rect x="88" y="148" width="172" height="40" rx="8" fill="#1a1625" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="98" y="164" class="mono" fill="#38bdf8" font-size="13" font-weight="bold">&lt;thead&gt;</text>
  <text x="98" y="180" class="sans" fill="#475569" font-size="10">Header section</text>
  <path d="M260,168 C273,168 284,163 290,160" stroke="#38bdf8" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#m-thd)"/>

  <!-- 3. <table> -->
  <rect x="88" y="198" width="172" height="40" rx="8" fill="#1a1625" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="98" y="214" class="mono" fill="#7dd3fc" font-size="13" font-weight="bold">&lt;table&gt;</text>
  <text x="98" y="230" class="sans" fill="#475569" font-size="10">The whole table</text>
  <path d="M260,218 C273,218 284,218 290,218" stroke="#7dd3fc" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#m-tbl)"/>

  <!-- 4. <tbody> -->
  <rect x="88" y="246" width="172" height="40" rx="8" fill="#1a1625" stroke="#4ade80" stroke-width="1.5"/>
  <text x="98" y="262" class="mono" fill="#4ade80" font-size="13" font-weight="bold">&lt;tbody&gt;</text>
  <text x="98" y="278" class="sans" fill="#475569" font-size="10">Body section</text>
  <path d="M260,266 C273,266 284,250 290,244" stroke="#4ade80" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#m-tbd)"/>

  <!-- 5. <tfoot> -->
  <rect x="88" y="296" width="172" height="40" rx="8" fill="#1a1625" stroke="#86efac" stroke-width="1.5"/>
  <text x="98" y="312" class="mono" fill="#86efac" font-size="13" font-weight="bold">&lt;tfoot&gt;</text>
  <text x="98" y="328" class="sans" fill="#475569" font-size="10">Footer section</text>
  <path d="M260,316 C273,316 284,316 290,315" stroke="#86efac" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#m-tf)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!--                RIGHT LABELS                    -->
  <!-- ═══════════════════════════════════════════════ -->
  <!-- box: x=725, w=185  |  table right edge x=710 -->

  <!-- 1. <colgroup> -->
  <rect x="725" y="88" width="185" height="40" rx="8" fill="#1a1625" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="735" y="104" class="mono" fill="#fbbf24" font-size="13" font-weight="bold">&lt;colgroup&gt;</text>
  <text x="735" y="120" class="sans" fill="#475569" font-size="10">Groups all columns</text>
  <path d="M725,108 C700,108 620,100 500,100" stroke="#fbbf24" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#m-cg)"/>

  <!-- 2. <col> -->
  <rect x="725" y="138" width="185" height="40" rx="8" fill="#1a1625" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="735" y="154" class="mono" fill="#f59e0b" font-size="13" font-weight="bold">&lt;col&gt;</text>
  <text x="735" y="170" class="sans" fill="#475569" font-size="10">Single column props</text>
  <path d="M725,158 C690,158 580,148 430,140" stroke="#f59e0b" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#m-col)"/>

  <!-- 3. <th> -->
  <rect x="725" y="188" width="185" height="40" rx="8" fill="#1a1625" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="735" y="204" class="mono" fill="#67e8f9" font-size="13" font-weight="bold">&lt;th&gt;</text>
  <text x="735" y="220" class="sans" fill="#475569" font-size="10">Header cell (bold)</text>
  <path d="M725,208 C715,208 695,185 570,160" stroke="#67e8f9" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#m-th)"/>

  <!-- 4. <tr> -->
  <rect x="725" y="238" width="185" height="40" rx="8" fill="#1a1625" stroke="#a3e635" stroke-width="1.5"/>
  <text x="735" y="254" class="mono" fill="#a3e635" font-size="13" font-weight="bold">&lt;tr&gt;</text>
  <text x="735" y="270" class="sans" fill="#475569" font-size="10">A table row</text>
  <path d="M725,258 C717,258 714,228 710,201" stroke="#a3e635" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#m-tr)"/>

  <!-- 5. <td> -->
  <rect x="725" y="288" width="185" height="40" rx="8" fill="#1a1625" stroke="#fb923c" stroke-width="1.5"/>
  <text x="735" y="304" class="mono" fill="#fb923c" font-size="13" font-weight="bold">&lt;td&gt;</text>
  <text x="735" y="320" class="sans" fill="#475569" font-size="10">A data cell</text>
  <path d="M725,308 C710,308 560,275 430,239" stroke="#fb923c" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#m-td)"/>

